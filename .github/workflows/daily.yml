name: Daily EMY Automation (Matrix)

on:
  workflow_dispatch:

jobs:
  # Job 1: Εξαγωγή της λίστας των σταθμών
  extract-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Selenium
      run: pip install selenium
    - name: Run Station Extractor
    # Αυτό το βήμα θα δημιουργήσει το stations.json
      run: python extract_stations.py
    - id: set-matrix
    # Διαβάζει το JSON και το περνάει ως output στο επόμενο job
      run: |
        echo "matrix=$(cat stations.json | jq -c .)" >> $GITHUB_OUTPUT

  # Job 2: Η Μαζική Σάρωση (Matrix Worker)
  run-workers:
    needs: extract-list
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false # Αν ένας σταθμός αποτύχει, οι άλλοι συνεχίζουν!
      max-parallel: 20 # Τρέχουμε μέχρι 20 ρομπότ ταυτόχρονα
      matrix:
        # Το GitHub θα δημιουργήσει 80+ jobs, ένα για κάθε 'item' στο matrix
        station: ${{ fromJson(needs.extract-list.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Selenium
      run: pip install selenium
    - name: Execute Script for Station
    # Περνάμε το ID και το Ονομα του σταθμού ως ορίσματα!
      run: python screenshot.py ${{ matrix.station.id }} "${{ matrix.station.name }}"
    - name: Save Changes
    # Κάθε ρομπότ σώζει τις φωτογραφίες του στον ημερήσιο φάκελο
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add screenshots/
        git commit -m "update: ${{ matrix.station.name }} MAX/MIN" || echo "No changes"
        git push
