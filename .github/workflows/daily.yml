name: Daily EMY New Portal

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch:

jobs:
  run-logic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Execute Daily Screenshots
      run: python screenshot.py
      
    - name: Commit and Push Changes
    # Αυτό το βήμα σώζει τις 30 φωτογραφίες σου πίσω στο GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Auto-update: 30 Screenshots for $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
