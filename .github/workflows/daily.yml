name: Daily EMY Automation (Matrix V5)

on:
  workflow_dispatch:

jobs:
  extract-list:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v4
    - name: Run Extractor
      id: set-matrix
      run: |
        python extract_stations.py
        # Μετατρέπουμε το JSON σε μία γραμμή για το Matrix
        echo "matrix=$(cat stations.json)" >> $GITHUB_OUTPUT

  run-workers:
    needs: extract-list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        station: ${{ fromJson(needs.extract-list.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Selenium
      run: pip install selenium
    - name: Execute for ${{ matrix.station.name }}
      run: python screenshot.py ${{ matrix.station.id }} "${{ matrix.station.name }}"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: screenshot-${{ matrix.station.id }}
        path: screenshots/
        retention-days: 1

  final-commit:
    needs: run-workers
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download All
      uses: actions/download-artifact@v4
      with:
        path: all_screenshots
        pattern: screenshot-*
        merge-multiple: true
    - name: Organize and Push
      run: |
        mkdir -p screenshots
        cp -r all_screenshots/* screenshots/
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add screenshots/
        git commit -m "Update: $(date +'%Y-%m-%d')" || echo "No changes"
        git push
